# ================================================================
# Host-Nginx Konfiguration für workpilot.basharfarhat.com
#
# Auf dem VPS:
#   sudo cp nginx.vps.conf /etc/nginx/sites-available/workpilot
#   sudo ln -s /etc/nginx/sites-available/workpilot /etc/nginx/sites-enabled/workpilot
#   sudo nginx -t
#   sudo systemctl reload nginx
#
# SSL-Zertifikat danach:
#   sudo certbot --nginx -d workpilot.basharfarhat.com
# ================================================================

# HTTP → HTTPS Redirect
server {
    listen 80;
    listen [::]:80;
    server_name workpilot.basharfarhat.com;

    # Certbot nutzt diesen Block für die ACME-Challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS – Hauptkonfiguration
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name workpilot.basharfarhat.com;

    # SSL-Zertifikate (werden von certbot automatisch eingetragen)
    ssl_certificate     /etc/letsencrypt/live/workpilot.basharfarhat.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/workpilot.basharfarhat.com/privkey.pem;

    # Empfohlene SSL-Einstellungen
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security Headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Alles weiterleiten an den WorkPilot Docker-Container auf Port 3001
    # (client nginx → der dann /api/ intern an den server container weiterleitet)
    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}
