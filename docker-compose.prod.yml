# ==============================================================
# Docker Compose – Production Stack
# Starten:  docker compose -f docker-compose.prod.yml up -d --build
# Stoppen:  docker compose -f docker-compose.prod.yml down
# Logs:     docker compose -f docker-compose.prod.yml logs -f
# ==============================================================
#
# Benötigte Umgebungsvariablen (.env Datei im Projekt-Root):
#   POSTGRES_PASSWORD  – Datenbankpasswort
#   JWT_SECRET         – Geheimer Schlüssel für JWT-Token
#   CLIENT_URL         – Öffentliche URL des Frontends (z.B. https://example.com)
#   RESEND_API_KEY     – API Key für E-Mail-Versand (Resend)
#   GOOGLE_CLIENT_ID   – Google OAuth Client ID (optional)
#   GOOGLE_CLIENT_SECRET – Google OAuth Client Secret (optional)
# ==============================================================

services:

  # ── Datenbank ─────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: taskmanager-db
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: taskmanager
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    # In Production nicht nach außen exponieren
    expose:
      - "5432"

  # ── Backend (Node.js / Express) ───────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: taskmanager-server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/taskmanager
      JWT_SECRET: ${JWT_SECRET}
      CLIENT_URL: ${CLIENT_URL}
      RESEND_API_KEY: ${RESEND_API_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "3000"

  # ── Frontend (React / Nginx) ──────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: taskmanager-client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "80:80"

# ── Volumes ───────────────────────────────────────────────────
volumes:
  pgdata:
    driver: local
